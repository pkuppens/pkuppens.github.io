name: Weekly dependency audit

on:
  schedule:
    # Thursday 00:30 UTC = 01:30 CET / 02:30 CEST (Amsterdam winter/summer)
    - cron: '30 0 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true
        id: audit

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Open issue on failure
        if: failure() || steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = `## ⚠️ Weekly dependency audit failed

            ### Details
            - **Date:** ${date}
            - **Workflow run:** [${runUrl}](${runUrl})

            ### Required actions
            1. Investigate the failure in the workflow logs
            2. Run \`npm audit\` locally to assess vulnerabilities
            3. Apply fixes (e.g. \`npm audit fix\`, dependency bumps)
            4. Verify with \`npm run typecheck && npm test && npm run build\`
            5. Create a PR with the fixes

            ---
            _This issue was auto-generated by the weekly dependency audit workflow._`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'dependencies', 'automated']
            });

            const existing = issues.data.find(i =>
              i.title.includes('Weekly dependency audit failed')
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Workflow run [${runUrl}](${runUrl}) also failed (${date}).`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Weekly dependency audit failed — ${date}`,
                body: body,
                labels: ['security', 'dependencies', 'automated']
              });
            }
