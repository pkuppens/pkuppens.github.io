name: Cleanup obsolete Actions runs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      min_age_days:
        description: "Only delete runs older than this many days"
        required: false
        default: "0"
        type: string
      max_deletions:
        description: "Upper bound on number of runs to delete per run"
        required: false
        default: "200"
        type: string
      dry_run:
        description: "If true, do not delete; only print what would be deleted"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: write

concurrency:
  group: "actions-runs-cleanup"
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete obsolete completed runs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Defaults for push-to-main runs (real deletion).
      MIN_AGE_DAYS: 0
      MAX_DELETIONS: 200
      DRY_RUN: "true"

    steps:
      - name: Cleanup obsolete runs (push)
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@v7
        env:
          MIN_AGE_DAYS: ${{ env.MIN_AGE_DAYS }}
          MAX_DELETIONS: ${{ env.MAX_DELETIONS }}
          DRY_RUN: ${{ env.DRY_RUN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const dryRun = String(process.env.DRY_RUN ?? "false").toLowerCase() === "true";
            const minAgeDays = Number(process.env.MIN_AGE_DAYS ?? 14);
            const maxDeletions = Number(process.env.MAX_DELETIONS ?? 200);

            const cutoffMs = Date.now() - minAgeDays * 24 * 60 * 60 * 1000;

            function createdAtMs(run) {
              return new Date(run.created_at).getTime();
            }

            core.info(`Owner/repo: ${owner}/${repo}`);
            core.info(`dryRun=${dryRun} minAgeDays=${minAgeDays} maxDeletions=${maxDeletions}`);

            // 1) Fetch current workflows
            const workflows = await github.paginate("GET /repos/{owner}/{repo}/actions/workflows", {
              owner,
              repo,
              per_page: 100,
            });
            const workflowIdSet = new Set(workflows.map((w) => w.id));
            core.info(`Workflows in repo: ${workflowIdSet.size}`);

            // 2) Fetch current branches
            const branches = await github.paginate("GET /repos/{owner}/{repo}/branches", {
              owner,
              repo,
              per_page: 100,
            });
            const branchSet = new Set(branches.map((b) => b.name));
            core.info(`Branches in repo: ${branchSet.size}`);

            // 3) Fetch completed workflow runs (bounded)
            const maxPages = 50; // up to ~5000 workflow runs
            const perPage = 100;
            const allRuns = [];
            for (let page = 1; page <= maxPages; page++) {
              const resp = await github.request("GET /repos/{owner}/{repo}/actions/runs", {
                owner,
                repo,
                status: "completed",
                per_page: perPage,
                page,
              });
              const batch = resp.data.workflow_runs ?? [];
              if (batch.length === 0) break;
              allRuns.push(...batch);
            }
            core.info(`Fetched completed runs: ${allRuns.length}`);

            // Latest successful run timestamp per workflow (for superseded logic).
            const latestSuccessAt = new Map(); // workflowId -> ms
            for (const run of allRuns) {
              if (run.conclusion !== "success") continue;
              const ms = createdAtMs(run);
              const prev = latestSuccessAt.get(run.workflow_id);
              if (prev === undefined || ms > prev) latestSuccessAt.set(run.workflow_id, ms);
            }

            const candidates = [];
            for (const run of allRuns) {
              if (!run.conclusion) continue; // only completed with conclusion
              const ms = createdAtMs(run);
              if (ms >= cutoffMs) continue; // not old enough

              const workflowExists = workflowIdSet.has(run.workflow_id);
              const branchExists = branchSet.has(run.head_branch);

              const latestAt = latestSuccessAt.get(run.workflow_id);
              const isSuperseded = latestAt !== undefined && ms < latestAt;
              const isLatestSuccess =
                run.conclusion === "success" && latestAt !== undefined && ms === latestAt;

              // Match the user-defined deletion categories.
              // - removed-workflow / removed-branch: always delete (if old enough).
              // - superseded-by-later-success: delete only if NOT the latest success.
              let reasons = [];
              let shouldDelete = false;

              if (!workflowExists) {
                shouldDelete = true;
                reasons.push("workflow-no-longer-exists");
              } else if (!branchExists) {
                shouldDelete = true;
                reasons.push("branch-no-longer-exists");
              } else if (isSuperseded && !isLatestSuccess) {
                shouldDelete = true;
                reasons.push("superseded-by-later-success");
              }

              if (shouldDelete) {
                candidates.push({ run_id: run.id, ms, workflow_id: run.workflow_id, reasons });
              }
            }

            // Delete oldest first, so the run list stays "clean" earlier.
            candidates.sort((a, b) => a.ms - b.ms);
            const toDelete = candidates.slice(0, maxDeletions);

            core.info(`Candidate deletions: ${candidates.length}. Will delete: ${toDelete.length}.`);

            let deletedCount = 0;
            for (const c of toDelete) {
              core.info(
                `${dryRun ? "[dry-run]" : "[delete]"} run_id=${c.run_id} reasons=${c.reasons.join(
                  ","
                )}`
              );

              if (dryRun) continue;

              await github.request("DELETE /repos/{owner}/{repo}/actions/runs/{run_id}", {
                owner,
                repo,
                run_id: c.run_id,
              });
              deletedCount += 1;
            }

            core.info(`Done. deletedCount=${deletedCount}`);

      - name: Cleanup obsolete runs (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/github-script@v7
        env:
          MIN_AGE_DAYS: ${{ inputs.min_age_days }}
          MAX_DELETIONS: ${{ inputs.max_deletions }}
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const dryRun = String(process.env.DRY_RUN ?? "true").toLowerCase() === "true";
            const minAgeDays = Number(process.env.MIN_AGE_DAYS ?? 14);
            const maxDeletions = Number(process.env.MAX_DELETIONS ?? 200);

            const cutoffMs = Date.now() - minAgeDays * 24 * 60 * 60 * 1000;

            function createdAtMs(run) {
              return new Date(run.created_at).getTime();
            }

            core.info(`Owner/repo: ${owner}/${repo}`);
            core.info(`dryRun=${dryRun} minAgeDays=${minAgeDays} maxDeletions=${maxDeletions}`);

            const workflows = await github.paginate("GET /repos/{owner}/{repo}/actions/workflows", {
              owner,
              repo,
              per_page: 100,
            });
            const workflowIdSet = new Set(workflows.map((w) => w.id));

            const branches = await github.paginate("GET /repos/{owner}/{repo}/branches", {
              owner,
              repo,
              per_page: 100,
            });
            const branchSet = new Set(branches.map((b) => b.name));

            const maxPages = 50;
            const perPage = 100;
            const allRuns = [];
            for (let page = 1; page <= maxPages; page++) {
              const resp = await github.request("GET /repos/{owner}/{repo}/actions/runs", {
                owner,
                repo,
                status: "completed",
                per_page: perPage,
                page,
              });
              const batch = resp.data.workflow_runs ?? [];
              if (batch.length === 0) break;
              allRuns.push(...batch);
            }

            const latestSuccessAt = new Map(); // workflowId -> ms
            for (const run of allRuns) {
              if (run.conclusion !== "success") continue;
              const ms = createdAtMs(run);
              const prev = latestSuccessAt.get(run.workflow_id);
              if (prev === undefined || ms > prev) latestSuccessAt.set(run.workflow_id, ms);
            }

            const candidates = [];
            for (const run of allRuns) {
              if (!run.conclusion) continue;
              const ms = createdAtMs(run);
              if (ms >= cutoffMs) continue;

              const workflowExists = workflowIdSet.has(run.workflow_id);
              const branchExists = branchSet.has(run.head_branch);

              const latestAt = latestSuccessAt.get(run.workflow_id);
              const isSuperseded = latestAt !== undefined && ms < latestAt;
              const isLatestSuccess =
                run.conclusion === "success" && latestAt !== undefined && ms === latestAt;

              let reasons = [];
              let shouldDelete = false;

              if (!workflowExists) {
                shouldDelete = true;
                reasons.push("workflow-no-longer-exists");
              } else if (!branchExists) {
                shouldDelete = true;
                reasons.push("branch-no-longer-exists");
              } else if (isSuperseded && !isLatestSuccess) {
                shouldDelete = true;
                reasons.push("superseded-by-later-success");
              }

              if (shouldDelete) {
                candidates.push({ run_id: run.id, ms, workflow_id: run.workflow_id, reasons });
              }
            }

            candidates.sort((a, b) => a.ms - b.ms);
            const toDelete = candidates.slice(0, maxDeletions);

            core.info(`Candidate deletions: ${candidates.length}. Will delete: ${toDelete.length}.`);

            let deletedCount = 0;
            for (const c of toDelete) {
              core.info(
                `${dryRun ? "[dry-run]" : "[delete]"} run_id=${c.run_id} reasons=${c.reasons.join(
                  ","
                )}`
              );
              if (dryRun) continue;

              await github.request("DELETE /repos/{owner}/{repo}/actions/runs/{run_id}", {
                owner,
                repo,
                run_id: c.run_id,
              });
              deletedCount += 1;
            }

            core.info(`Done. deletedCount=${deletedCount}`);

